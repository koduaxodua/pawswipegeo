    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Primary -->
    <title>mipove.me - Find and help homeless pets in Georgia</title>
    <meta name="description" content="mipove.me helps people in Georgia share, find, and safely contact each other about homeless, lost, or adoptable dogs and cats." />
    <link rel="canonical" href="https://mipove.me/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, WhatsApp, iMessage, Telegram, etc.) -->
    <meta property="og:site_name" content="mipove.me" />
    <meta property="og:title" content="mipove.me - Pet rescue listings in Georgia" />
    <meta property="og:description" content="Find, share, and help homeless, lost, or adoptable dogs and cats through safer public pet listings." />
    <meta property="og:url" content="https://mipove.me/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ka_GE" />

    <meta property="og:image:secure_url" content="https://mipove.me/brand/og-image.jpg?v=20260503-ui-crop" />

    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1671" />
    <meta property="og:image:alt" content="mipove.me pet listing interface preview" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="mipove.me - Pet rescue listings in Georgia" />
    <meta name="twitter:description" content="Find, share, and help homeless, lost, or adoptable dogs and cats through safer public pet listings." />

    <meta name="twitter:image:alt" content="mipove.me pet listing interface preview" />

    <!-- Icons - inline SVG paw emoji, no longer references the old PRG logo file -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='70'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E" />

    <!-- Google AdSense verification. Ad scripts are loaded only on content pages after consent. -->
    <meta name="google-adsense-account" content="ca-pub-5803703412690830" />

    <!-- Google consent defaults. External GA/AdSense scripts are loaded only after in-app consent. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });

      window.__MIPOVE_ADS_ALLOWED_PATHS__ = ['/2', '/2/about', '/2/safety', '/2/how-it-works'];

      window.__mipoveCanLoadAds = function () {
        return window.__MIPOVE_ADS_ALLOWED_PATHS__.includes(window.location.pathname);
      };

      window.__mipoveLoadAdsense = function () {
        if (!window.__mipoveCanLoadAds()) return;
        if (window.__mipoveAdsLoaded) return;

        window.__mipoveAdsLoaded = true;
        window.adsbygoogle = window.adsbygoogle || [];

        var script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5803703412690830';
        document.head.appendChild(script);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
